<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #eee;
    }
    header .logo {
      width: 22px; height: 22px;
      background: #4f46e5;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 700;
    }
    header h1 { font-size: 14px; font-weight: 600; flex: 1; }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }
    .toggle-label { font-weight: 500; }
    .toggle-sub   { font-size: 11px; color: #888; margin-top: 2px; }

    /* Toggle switch */
    .switch { position: relative; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 24px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider             { background: #4f46e5; }
    input:checked + .slider::before     { transform: translateX(20px); }

    /* ── Last activity ── */
    .activity {
      margin: 0 16px 14px;
      padding: 10px 12px;
      background: #f8f8f8;
      border-radius: 8px;
      border: 1px solid #ebebeb;
    }
    .activity-label {
      font-size: 10px; font-weight: 600;
      color: #888; letter-spacing: 0.05em;
      text-transform: uppercase; margin-bottom: 5px;
    }
    .activity-title {
      font-size: 12px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .activity-url {
      font-size: 11px; color: #999; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .activity-time {
      font-size: 10px; color: #bbb; margin-top: 4px;
    }
    .no-activity { font-size: 12px; color: #bbb; }

    /* ── Footer ── */
    footer {
      padding: 10px 16px;
      border-top: 1px solid #eee;
      font-size: 10px; color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">P</div>
  <h1>Pattern Bridge</h1>
</header>

<div class="toggle-row">
  <div>
    <div class="toggle-label" id="stateLabel">수집 중</div>
    <div class="toggle-sub">127.0.0.1:7701 로 전송</div>
  </div>
  <label class="switch">
    <input type="checkbox" id="toggle" checked />
    <span class="slider"></span>
  </label>
</div>

<div class="activity">
  <div class="activity-label">마지막 전송</div>
  <div id="activityContent" class="no-activity">아직 전송 없음</div>
</div>

<footer>중복 방지: 같은 URL은 30초 내 재전송 안 함</footer>

<script src="popup.js"></script>
</body>
</html>
